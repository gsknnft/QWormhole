name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run semantic-release in dry-run mode (no publish)"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  packages: write
  id-token: write 

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false


jobs:
  prebuilds:
    name: Prebuild ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: windows-latest
            platform: win32-x64
          - os: macos-latest
            platform: darwin-arm64
    env:
      QWORMHOLE_NATIVE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build native bindings
        continue-on-error: true
        run: pnpm --filter @gsknnft/qwormhole run rebuild

      - name: Stage platform prebuilds
        continue-on-error: true
        run: pnpm --filter @gsknnft/qwormhole run native:stage-prebuilds

      - name: Upload prebuild artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.platform }}
          path: packages/QWormhole/prebuilds/
          if-no-files-found: ignore

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: prebuilds
    env:
      QWORMHOLE_NATIVE: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Download prebuild artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: prebuilds-*
          path: packages/QWormhole/prebuilds/
          merge-multiple: true

      - name: Show prebuild inventory
        shell: bash
        run: |
          echo "Prebuild files found:"
          find packages/QWormhole/prebuilds -type f -name "*.node" 2>/dev/null || true

      - name: Build artifacts
        run: pnpm --filter @gsknnft/qwormhole run build

      - name: Run unit tests
        run: pnpm --filter @gsknnft/qwormhole test

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            echo "[release] running semantic-release --dry-run"
            pnpm dlx semantic-release --dry-run
          else
            echo "[release] running semantic-release publish flow"
            pnpm dlx semantic-release
          fi
